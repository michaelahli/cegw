<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEGW WebSocket Price Example</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #16181d;
    }

    main {
      width: min(720px, calc(100vw - 32px));
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 650;
    }

    .meta {
      margin: 0 0 20px;
      color: #596273;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
      margin: 20px 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: #596273;
      font-size: 13px;
      font-weight: 600;
    }

    select,
    button {
      min-height: 40px;
      border: 1px solid #c8d0dc;
      border-radius: 8px;
      background: #fff;
      color: #16181d;
      font: inherit;
    }

    select {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 16px;
      cursor: pointer;
      font-weight: 650;
    }

    .price {
      font-variant-numeric: tabular-nums;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1;
      margin: 18px 0 10px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      border: 1px solid #d8dde6;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      background: #fafbfc;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #b4bbc8;
    }

    .dot.connected {
      background: #169b62;
    }

    .dot.error {
      background: #d13b3b;
    }

    pre {
      overflow: auto;
      margin: 20px 0 0;
      padding: 14px;
      border-radius: 8px;
      background: #10141f;
      color: #e6edf7;
      font-size: 13px;
      min-height: 72px;
    }

    @media (max-width: 620px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Binance BTC/USDT</h1>
    <p class="meta">CEGW WebSocket latest price stream</p>

    <div class="controls">
      <label>
        Exchange
        <select id="exchangeSelect"></select>
      </label>
      <label>
        Symbol
        <select id="symbolSelect"></select>
      </label>
      <button id="connectButton" type="button">Connect</button>
    </div>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Not connected</span>
    </div>

    <div id="price" class="price">-</div>

    <div class="row">
      <div id="exchangePill" class="pill">Exchange: Binance (2)</div>
      <div id="symbolPill" class="pill">Symbol: BTC/USDT</div>
      <div id="timestamp" class="pill">Waiting for update</div>
    </div>

    <pre id="payload">{}</pre>
  </main>

  <script>
    const exchanges = [
      { id: "2", name: "Binance", symbols: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT", "XRP/USDT"] },
      { id: "6", name: "OKX", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "7", name: "KuCoin", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "KCS/USDT"] },
      { id: "9", name: "Bybit", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "10", name: "Bitget", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "BGB/USDT"] },
      { id: "11", name: "Coinex", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "CET/USDT"] },
      { id: "1", name: "Tokocrypto", symbols: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT", "XRP/USDT"] },
      { id: "3", name: "Coinbase", symbols: ["BTC/USD", "ETH/USD", "SOL/USD", "XRP/USD", "DOGE/USD"] },
      { id: "4", name: "CEX.IO", symbols: ["BTC/USD", "ETH/USD", "BTC/USDT", "ETH/USDT"] },
      { id: "5", name: "Indodax", symbols: ["BTC/IDR", "ETH/IDR", "USDT/IDR", "BNB/IDR", "SOL/IDR"] },
      { id: "8", name: "Crypto.com", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "12", name: "Hashkey", symbols: ["BTC/USD", "ETH/USD", "BTC/USDT", "ETH/USDT"] },
    ];

    let ws;

    const titleEl = document.getElementById("title");
    const exchangeSelect = document.getElementById("exchangeSelect");
    const symbolSelect = document.getElementById("symbolSelect");
    const connectButton = document.getElementById("connectButton");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const priceEl = document.getElementById("price");
    const exchangePill = document.getElementById("exchangePill");
    const symbolPill = document.getElementById("symbolPill");
    const timestampEl = document.getElementById("timestamp");
    const payloadEl = document.getElementById("payload");

    const setStatus = (text, className = "") => {
      statusText.textContent = text;
      statusDot.className = `dot ${className}`.trim();
    };

    const selectedExchange = () => exchanges.find((exchange) => exchange.id === exchangeSelect.value);

    const populateSymbols = () => {
      const exchange = selectedExchange();
      symbolSelect.replaceChildren(
        ...exchange.symbols.map((symbol) => new Option(symbol, symbol)),
      );
    };

    const connect = () => {
      if (ws) {
        ws.close();
      }

      const exchange = selectedExchange();
      const symbol = symbolSelect.value;
      const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const wsHost = window.location.host || "localhost:8080";
      const wsUrl = `${wsProtocol}//${wsHost}/v1/ws/market/price?exchange=${exchange.id}&symbol=${encodeURIComponent(symbol)}`;

      titleEl.textContent = `${exchange.name} ${symbol}`;
      exchangePill.textContent = `Exchange: ${exchange.name} (${exchange.id})`;
      symbolPill.textContent = `Symbol: ${symbol}`;
      priceEl.textContent = "-";
      timestampEl.textContent = "Waiting for update";
      payloadEl.textContent = "{}";
      setStatus(`Connecting to ${wsUrl}`);

      ws = new WebSocket(wsUrl);

      ws.addEventListener("open", () => {
        setStatus(`Connected to ${wsUrl}`, "connected");
      });

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        payloadEl.textContent = JSON.stringify(data, null, 2);

        if (data.error) {
          setStatus(data.error, "error");
          return;
        }

        priceEl.textContent = Number(data.price).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 8,
        });
        timestampEl.textContent = new Date(data.timestamp).toLocaleString();
      });

      ws.addEventListener("close", () => {
        setStatus("Disconnected", "error");
      });

      ws.addEventListener("error", () => {
        setStatus("WebSocket error", "error");
      });
    };

    exchangeSelect.replaceChildren(
      ...exchanges.map((exchange) => new Option(exchange.name, exchange.id)),
    );
    exchangeSelect.value = "2";
    populateSymbols();
    connectButton.addEventListener("click", connect);
    exchangeSelect.addEventListener("change", populateSymbols);
  </script>
</body>
</html>
