<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEGW WebSocket Price Example</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #16181d;
    }

    main {
      width: min(920px, calc(100vw - 32px));
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 650;
    }

    .meta {
      margin: 0 0 20px;
      color: #596273;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 12px;
      align-items: end;
      margin: 20px 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: #596273;
      font-size: 13px;
      font-weight: 600;
    }

    select,
    button {
      min-height: 40px;
      border: 1px solid #c8d0dc;
      border-radius: 8px;
      background: #fff;
      color: #16181d;
      font: inherit;
    }

    select {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 16px;
      cursor: pointer;
      font-weight: 650;
    }

    .price {
      font-variant-numeric: tabular-nums;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1;
      margin: 18px 0 10px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      border: 1px solid #d8dde6;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      background: #fafbfc;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #b4bbc8;
    }

    .dot.connected {
      background: #169b62;
    }

    .dot.error {
      background: #d13b3b;
    }

    .chartHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .chartTitle {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
    }

    .chartWrap {
      position: relative;
      margin-top: 10px;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fbfcfe;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 320px;
    }

    .emptyChart {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #7b8494;
      font-size: 14px;
      pointer-events: none;
    }

    pre {
      overflow: auto;
      margin: 20px 0 0;
      padding: 14px;
      border-radius: 8px;
      background: #10141f;
      color: #e6edf7;
      font-size: 13px;
      min-height: 72px;
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Binance BTC/USDT</h1>
    <p class="meta">CEGW OHLCV history + WebSocket live price stream</p>

    <div class="controls">
      <label>
        Exchange
        <select id="exchangeSelect"></select>
      </label>
      <label>
        Symbol
        <select id="symbolSelect"></select>
      </label>
      <label>
        Timeframe
        <select id="timeframeSelect">
          <option value="1">1m</option>
          <option value="2">5m</option>
          <option value="3">30m</option>
          <option value="5" selected>1h</option>
          <option value="8">1d</option>
          <option value="9">1w</option>
          <option value="10">1M</option>
        </select>
      </label>
      <button id="connectButton" type="button">Load & Connect</button>
    </div>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Not connected</span>
    </div>

    <div id="price" class="price">-</div>

    <div class="row">
      <div id="exchangePill" class="pill">Exchange: Binance (2)</div>
      <div id="symbolPill" class="pill">Symbol: BTC/USDT</div>
      <div id="timeframePill" class="pill">Timeframe: 1h</div>
      <div id="timestamp" class="pill">Waiting for update</div>
    </div>

    <div class="chartHeader">
      <p class="chartTitle">Candlestick</p>
      <div id="ohlcPill" class="pill">OHLC: -</div>
    </div>
    <div class="chartWrap">
      <canvas id="candlestickChart"></canvas>
      <div id="emptyChart" class="emptyChart">Load history to draw candles</div>
    </div>

    <pre id="payload">{}</pre>
  </main>

  <script>
    const exchanges = [
      { id: "2", name: "Binance", symbols: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT", "XRP/USDT"] },
      { id: "6", name: "OKX", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "7", name: "KuCoin", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "KCS/USDT"] },
      { id: "9", name: "Bybit", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "10", name: "Bitget", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "BGB/USDT"] },
      { id: "11", name: "Coinex", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "CET/USDT"] },
      { id: "1", name: "Tokocrypto", symbols: ["BTC/USDT", "ETH/USDT", "BNB/USDT", "SOL/USDT", "XRP/USDT"] },
      { id: "3", name: "Coinbase", symbols: ["BTC/USD", "ETH/USD", "SOL/USD", "XRP/USD", "DOGE/USD"] },
      { id: "4", name: "CEX.IO", symbols: ["BTC/USD", "ETH/USD", "BTC/USDT", "ETH/USDT"] },
      { id: "5", name: "Indodax", symbols: ["BTC/IDR", "ETH/IDR", "USDT/IDR", "BNB/IDR", "SOL/IDR"] },
      { id: "8", name: "Crypto.com", symbols: ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "DOGE/USDT"] },
      { id: "12", name: "Hashkey", symbols: ["BTC/USD", "ETH/USD", "BTC/USDT", "ETH/USDT"] },
    ];

    const intervals = {
      "1": { label: "1m", ms: 60 * 1000 },
      "2": { label: "5m", ms: 5 * 60 * 1000 },
      "3": { label: "30m", ms: 30 * 60 * 1000 },
      "5": { label: "1h", ms: 60 * 60 * 1000 },
      "8": { label: "1d", ms: 24 * 60 * 60 * 1000 },
      "9": { label: "1w", ms: 7 * 24 * 60 * 60 * 1000 },
      "10": { label: "1M", ms: 30 * 24 * 60 * 60 * 1000 },
    };

    const historyLimit = 48;
    let ws;
    let candles = [];

    const titleEl = document.getElementById("title");
    const exchangeSelect = document.getElementById("exchangeSelect");
    const symbolSelect = document.getElementById("symbolSelect");
    const timeframeSelect = document.getElementById("timeframeSelect");
    const connectButton = document.getElementById("connectButton");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const priceEl = document.getElementById("price");
    const exchangePill = document.getElementById("exchangePill");
    const symbolPill = document.getElementById("symbolPill");
    const timeframePill = document.getElementById("timeframePill");
    const ohlcPill = document.getElementById("ohlcPill");
    const timestampEl = document.getElementById("timestamp");
    const payloadEl = document.getElementById("payload");
    const chartCanvas = document.getElementById("candlestickChart");
    const emptyChart = document.getElementById("emptyChart");
    const chartCtx = chartCanvas.getContext("2d");

    const setStatus = (text, className = "") => {
      statusText.textContent = text;
      statusDot.className = `dot ${className}`.trim();
    };

    const selectedExchange = () => exchanges.find((exchange) => exchange.id === exchangeSelect.value);

    const selectedInterval = () => intervals[timeframeSelect.value];

    const apiHttpBaseUrl = () => {
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return `${window.location.protocol}//${window.location.host}`;
      }
      return "http://localhost:8080";
    };

    const apiWebSocketBaseUrl = () => {
      if (window.location.protocol === "https:") {
        return `wss://${window.location.host}`;
      }
      if (window.location.protocol === "http:") {
        return `ws://${window.location.host}`;
      }
      return "ws://localhost:8080";
    };

    const formatPrice = (price) => Number(price).toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 8,
    });

    const populateSymbols = () => {
      const exchange = selectedExchange();
      symbolSelect.replaceChildren(
        ...exchange.symbols.map((symbol) => new Option(symbol, symbol)),
      );
    };

    const resetCandles = (message = "Load history to draw candles") => {
      candles = [];
      ohlcPill.textContent = "OHLC: -";
      emptyChart.textContent = message;
      emptyChart.style.display = "grid";
      drawCandles();
    };

    const setCurrentOHLC = () => {
      const current = candles[candles.length - 1];
      if (!current) {
        ohlcPill.textContent = "OHLC: -";
        return;
      }
      ohlcPill.textContent = `OHLC: ${formatPrice(current.open)} / ${formatPrice(current.high)} / ${formatPrice(current.low)} / ${formatPrice(current.close)}`;
    };

    const seedHistory = (quotes) => {
      candles = quotes.slice(-historyLimit).map((quote) => ({
        time: new Date(quote.timestamp).getTime(),
        open: quote.ohlcv.open,
        high: quote.ohlcv.high,
        low: quote.ohlcv.low,
        close: quote.ohlcv.close,
      }));

      emptyChart.style.display = candles.length === 0 ? "grid" : "none";
      emptyChart.textContent = candles.length === 0 ? "No OHLCV history returned" : "";
      setCurrentOHLC();
      drawCandles();
    };

    const updateLiveCandle = (price, timestamp) => {
      const interval = selectedInterval().ms;
      const time = new Date(timestamp).getTime();
      const bucket = Math.floor(time / interval) * interval;
      const last = candles[candles.length - 1];

      if (!last || last.time < bucket) {
        const open = last ? last.close : price;
        candles.push({
          time: bucket,
          open,
          high: Math.max(open, price),
          low: Math.min(open, price),
          close: price,
        });
        if (candles.length > historyLimit) {
          candles.shift();
        }
      } else {
        last.high = Math.max(last.high, price);
        last.low = Math.min(last.low, price);
        last.close = price;
      }

      emptyChart.style.display = candles.length === 0 ? "grid" : "none";
      setCurrentOHLC();
      drawCandles();
    };

    const resizeCanvas = () => {
      const rect = chartCanvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      chartCanvas.width = Math.max(1, Math.floor(rect.width * scale));
      chartCanvas.height = Math.max(1, Math.floor(rect.height * scale));
      chartCtx.setTransform(scale, 0, 0, scale, 0, 0);
      drawCandles();
    };

    const drawCandles = () => {
      const width = chartCanvas.clientWidth;
      const height = chartCanvas.clientHeight;
      chartCtx.clearRect(0, 0, width, height);

      const padding = { top: 22, right: 72, bottom: 28, left: 14 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      chartCtx.fillStyle = "#fbfcfe";
      chartCtx.fillRect(0, 0, width, height);

      chartCtx.strokeStyle = "#e3e7ee";
      chartCtx.lineWidth = 1;
      for (let i = 0; i <= 4; i += 1) {
        const y = padding.top + (chartHeight / 4) * i;
        chartCtx.beginPath();
        chartCtx.moveTo(padding.left, y);
        chartCtx.lineTo(width - padding.right + 8, y);
        chartCtx.stroke();
      }

      if (candles.length === 0) {
        return;
      }

      const low = Math.min(...candles.map((candle) => candle.low));
      const high = Math.max(...candles.map((candle) => candle.high));
      const range = high - low || Math.max(high * 0.001, 1);
      const min = low - range * 0.08;
      const max = high + range * 0.08;
      const priceToY = (price) => padding.top + ((max - price) / (max - min)) * chartHeight;
      const candleWidth = Math.max(4, chartWidth / historyLimit * 0.58);
      const step = chartWidth / Math.max(historyLimit - 1, 1);
      const startX = padding.left + chartWidth - step * (candles.length - 1);

      chartCtx.font = "12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      chartCtx.fillStyle = "#596273";
      chartCtx.textAlign = "left";
      chartCtx.textBaseline = "middle";
      for (let i = 0; i <= 4; i += 1) {
        const value = max - ((max - min) / 4) * i;
        const y = padding.top + (chartHeight / 4) * i;
        chartCtx.fillText(formatPrice(value), width - padding.right + 14, y);
      }

      candles.forEach((candle, index) => {
        const x = startX + step * index;
        const openY = priceToY(candle.open);
        const closeY = priceToY(candle.close);
        const highY = priceToY(candle.high);
        const lowY = priceToY(candle.low);
        const rising = candle.close >= candle.open;
        const color = rising ? "#169b62" : "#d13b3b";
        const bodyTop = Math.min(openY, closeY);
        const bodyHeight = Math.max(2, Math.abs(closeY - openY));

        chartCtx.strokeStyle = color;
        chartCtx.fillStyle = color;
        chartCtx.lineWidth = 1.5;
        chartCtx.beginPath();
        chartCtx.moveTo(x, highY);
        chartCtx.lineTo(x, lowY);
        chartCtx.stroke();
        chartCtx.fillRect(x - candleWidth / 2, bodyTop, candleWidth, bodyHeight);
      });
    };

    const loadHistory = async (exchange, symbol, interval) => {
      const end = new Date();
      const start = new Date(end.getTime() - interval.ms * historyLimit);
      const baseUrl = apiHttpBaseUrl();

      const response = await fetch(`${baseUrl}/v1/market/quotes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          exchange: Number(exchange.id),
          symbol,
          interval: Number(timeframeSelect.value),
          start: start.toISOString(),
          end: end.toISOString(),
          limit: historyLimit,
        }),
      });

      const data = await response.json();
      payloadEl.textContent = JSON.stringify(data, null, 2);

      if (!response.ok) {
        throw new Error(data.message || data.error || "failed to load quotes");
      }

      return data.quotes || [];
    };

    const connect = async () => {
      if (ws) {
        ws.close();
      }

      const exchange = selectedExchange();
      const symbol = symbolSelect.value;
      const interval = selectedInterval();
      const wsUrl = `${apiWebSocketBaseUrl()}/v1/ws/market/price?exchange=${exchange.id}&symbol=${encodeURIComponent(symbol)}`;

      titleEl.textContent = `${exchange.name} ${symbol}`;
      exchangePill.textContent = `Exchange: ${exchange.name} (${exchange.id})`;
      symbolPill.textContent = `Symbol: ${symbol}`;
      timeframePill.textContent = `Timeframe: ${interval.label}`;
      priceEl.textContent = "-";
      timestampEl.textContent = "Loading history";
      resetCandles("Loading OHLCV history");
      setStatus(`Loading ${interval.label} history`);

      try {
        const quotes = await loadHistory(exchange, symbol, interval);
        seedHistory(quotes);
        setStatus(`Connecting to ${wsUrl}`);
      } catch (error) {
        setStatus(error.message, "error");
        emptyChart.textContent = error.message;
        emptyChart.style.display = "grid";
        return;
      }

      ws = new WebSocket(wsUrl);

      ws.addEventListener("open", () => {
        setStatus("Connected: history + live ticks", "connected");
      });

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        payloadEl.textContent = JSON.stringify(data, null, 2);

        if (data.error) {
          setStatus(data.error, "error");
          return;
        }

        const price = Number(data.price);
        priceEl.textContent = formatPrice(price);
        timestampEl.textContent = new Date(data.timestamp).toLocaleString();
        updateLiveCandle(price, data.timestamp);
      });

      ws.addEventListener("close", () => {
        setStatus("Disconnected", "error");
      });

      ws.addEventListener("error", () => {
        setStatus("WebSocket error", "error");
      });
    };

    exchangeSelect.replaceChildren(
      ...exchanges.map((exchange) => new Option(exchange.name, exchange.id)),
    );
    exchangeSelect.value = "2";
    populateSymbols();
    resizeCanvas();

    connectButton.addEventListener("click", () => {
      void connect();
    });
    exchangeSelect.addEventListener("change", populateSymbols);
    timeframeSelect.addEventListener("change", () => {
      timeframePill.textContent = `Timeframe: ${selectedInterval().label}`;
      resetCandles("Load history to draw candles");
    });
    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
