<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEGW WebSocket Price Example</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #16181d;
    }

    main {
      width: min(680px, calc(100vw - 32px));
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 650;
    }

    .meta {
      margin: 0 0 20px;
      color: #596273;
      font-size: 14px;
    }

    .price {
      font-variant-numeric: tabular-nums;
      font-size: clamp(34px, 8vw, 56px);
      line-height: 1;
      margin: 18px 0 10px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      border: 1px solid #d8dde6;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      background: #fafbfc;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #b4bbc8;
    }

    .dot.connected {
      background: #169b62;
    }

    .dot.error {
      background: #d13b3b;
    }

    pre {
      overflow: auto;
      margin: 20px 0 0;
      padding: 14px;
      border-radius: 8px;
      background: #10141f;
      color: #e6edf7;
      font-size: 13px;
      min-height: 72px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tokocrypto BTC/USDT</h1>
    <p class="meta">CEGW WebSocket latest price stream</p>

    <div class="status">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <div id="price" class="price">-</div>

    <div class="row">
      <div class="pill">Exchange: Tokocrypto (1)</div>
      <div class="pill">Symbol: BTC/USDT</div>
      <div id="timestamp" class="pill">Waiting for update</div>
    </div>

    <pre id="payload">{}</pre>
  </main>

  <script>
    const exchange = "1";
    const symbol = "BTC/USDT";
    const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const wsHost = window.location.host || "localhost:8080";
    const wsUrl = `${wsProtocol}//${wsHost}/v1/ws/market/price?exchange=${exchange}&symbol=${encodeURIComponent(symbol)}`;

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const priceEl = document.getElementById("price");
    const timestampEl = document.getElementById("timestamp");
    const payloadEl = document.getElementById("payload");

    const setStatus = (text, className = "") => {
      statusText.textContent = text;
      statusDot.className = `dot ${className}`.trim();
    };

    const ws = new WebSocket(wsUrl);

    ws.addEventListener("open", () => {
      setStatus(`Connected to ${wsUrl}`, "connected");
    });

    ws.addEventListener("message", (event) => {
      const data = JSON.parse(event.data);
      payloadEl.textContent = JSON.stringify(data, null, 2);

      if (data.error) {
        setStatus(data.error, "error");
        return;
      }

      priceEl.textContent = Number(data.price).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 8,
      });
      timestampEl.textContent = new Date(data.timestamp).toLocaleString();
    });

    ws.addEventListener("close", () => {
      setStatus("Disconnected", "error");
    });

    ws.addEventListener("error", () => {
      setStatus("WebSocket error", "error");
    });
  </script>
</body>
</html>
