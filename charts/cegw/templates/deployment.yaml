apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cegw.fullname" . }}
  labels:
    {{- include "cegw.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cegw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cegw.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cegw.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: grpc
          containerPort: {{ .Values.config.grpcPort }}
          protocol: TCP
        - name: http
          containerPort: {{ .Values.config.httpPort }}
          protocol: TCP
        env:
        - name: GRPC_PORT
          value: {{ .Values.config.grpcPort | quote }}
        - name: HTTP_PORT
          value: {{ .Values.config.httpPort | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.config.logLevel | quote }}
        - name: TIMEZONE
          value: {{ .Values.config.timezone | quote }}
        - name: SANDBOX_MODE
          value: {{ .Values.config.sandboxMode | quote }}
        {{- if .Values.config.httpsProxy }}
        - name: HTTPS_PROXY
          value: {{ .Values.config.httpsProxy | quote }}
        {{- end }}
        {{- if .Values.config.httpProxy }}
        - name: HTTP_PROXY
          value: {{ .Values.config.httpProxy | quote }}
        {{- end }}
        {{- if .Values.config.noProxy }}
        - name: NO_PROXY
          value: {{ .Values.config.noProxy | quote }}
        {{- end }}
        {{- if .Values.config.allowedWsOrigins }}
        - name: ALLOWED_WS_ORIGINS
          value: {{ join "," .Values.config.allowedWsOrigins | quote }}
        {{- end }}
        {{- if .Values.config.auth.enabled }}
        - name: AUTH_ENABLED
          value: {{ .Values.config.auth.enabled | quote }}
        - name: AUTH_TYPE
          value: {{ .Values.config.auth.type | quote }}
        {{- if eq .Values.config.auth.type "basic" }}
        {{- if .Values.config.auth.basicUsername }}
        - name: AUTH_BASIC_USERNAME
          value: {{ .Values.config.auth.basicUsername | quote }}
        {{- end }}
        {{- if .Values.config.auth.basicPassword }}
        - name: AUTH_BASIC_PASSWORD
          value: {{ .Values.config.auth.basicPassword | quote }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.config.auth.type "oauth2" }}
        {{- if .Values.config.auth.oauth2Issuer }}
        - name: AUTH_OAUTH2_ISSUER
          value: {{ .Values.config.auth.oauth2Issuer | quote }}
        {{- end }}
        {{- if .Values.config.auth.oauth2Audience }}
        - name: AUTH_OAUTH2_AUDIENCE
          value: {{ .Values.config.auth.oauth2Audience | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
