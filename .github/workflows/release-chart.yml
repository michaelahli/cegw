name: Release Helm Chart

on:
  push:
    tags:
      - "v*"

jobs:
  release-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Update Chart.yaml appVersion only
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHART_FILE="charts/cegw/Chart.yaml"
          
          # Get current versions
          CURRENT_CHART_VERSION=$(grep '^version:' $CHART_FILE | awk '{print $2}' | tr -d '"')
          CURRENT_APP_VERSION=$(grep '^appVersion:' $CHART_FILE | awk '{print $2}' | tr -d '"')
          
          echo "Current chart version: $CURRENT_CHART_VERSION"
          echo "Current app version: $CURRENT_APP_VERSION"
          echo "New app version: $VERSION"
          
          # Only update appVersion, keep chart version as-is
          sed -i 's/^appVersion: .*/appVersion: "'"$VERSION"'"/' $CHART_FILE
          
          # Show changes
          echo "Updated Chart.yaml:"
          grep -E '^(version|appVersion):' $CHART_FILE
          
          echo "chart_version=$CURRENT_CHART_VERSION" >> $GITHUB_OUTPUT
        id: update_chart

      - name: Commit Chart.yaml changes
        run: |
          git add charts/cegw/Chart.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(chart): update appVersion to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
