version: "2"
run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: internal/ccxt/client.go
      linters:
        - gosec
      text: "(G103|G706)"
    - path: internal/server/http.go
      linters:
        - gosec
      text: "G118"
